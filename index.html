<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tekstmaat — Voorleesomgeving</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Lexend:wght@400;500;600;700&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #f5f7f5;
    --surface: #ffffff;
    --surface-2: #fbfcfb;
    --ink: #0f1f17;
    --ink-2: #2b3a31;
    --muted: #6b7d72;
    --muted-2: #9aa9a0;
    --border: #e3e8e3;
    --border-strong: #cdd6cf;
    --primary: #064e3b;
    --primary-ink: #ffffff;
    --accent: #10b981;
    --accent-soft: #d1fae5;
    --highlight-word: #a7f3d0;
    --highlight-sentence: #ecfdf5;
    --warn: #b45309;
    --danger: #b91c1c;
    --shadow-sm: 0 1px 0 rgba(15,31,23,.04), 0 1px 2px rgba(15,31,23,.04);
    --shadow-md: 0 1px 0 rgba(15,31,23,.04), 0 6px 24px -10px rgba(15,31,23,.12);
    --shadow-lg: 0 1px 0 rgba(15,31,23,.04), 0 24px 60px -20px rgba(15,31,23,.18);
    --radius-sm: 6px;
    --radius: 10px;
    --radius-lg: 16px;
    --radius-xl: 22px;

    --font-ui: "Geist", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    --font-read: "Source Serif 4", Georgia, "Times New Roman", serif;
    --font-mono: ui-monospace, "SF Mono", Menlo, monospace;
  }

  /* dyslexic UI mode toggles font globally */
  body.dys-ui { --font-ui: "Lexend", "Atkinson Hyperlegible", "Geist", system-ui, sans-serif; letter-spacing: 0.01em; }
  body.dys-ui .read-flow { font-family: "Lexend", "Atkinson Hyperlegible", "Source Serif 4", serif; }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-ui);
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
  }

  button { font-family: inherit; }
  a { color: inherit; }
  input, textarea, select { font-family: inherit; color: inherit; }

  /* Scrollbars - subtle */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 8px; border: 2px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted-2); border: 2px solid transparent; background-clip: content-box; }

  /* App shell */
  .app {
    display: grid;
    grid-template-columns: 248px 1fr;
    grid-template-rows: 56px 1fr;
    grid-template-areas:
      "topbar topbar"
      "sidebar main";
    min-height: 100vh;
  }
  .topbar {
    grid-area: topbar;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px 0 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .topbar .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    letter-spacing: -0.01em;
    font-size: 16px;
  }
  .brand-mark {
    width: 26px; height: 26px;
    border-radius: 7px;
    background: var(--primary);
    color: var(--primary-ink);
    display: grid;
    place-items: center;
    font-family: var(--font-read);
    font-weight: 600;
    font-size: 16px;
    font-style: italic;
    letter-spacing: -0.02em;
  }
  .topbar-right { display: flex; align-items: center; gap: 8px; }
  .role-switch {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px;
  }
  .role-switch button {
    appearance: none;
    background: transparent;
    border: 0;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    font-weight: 500;
  }
  .role-switch button.active {
    background: var(--ink);
    color: #fff;
  }
  .role-switch button:not(.active):hover { color: var(--ink); }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #d4f0e2, #86d8b1);
    color: var(--primary);
    font-size: 12px;
    font-weight: 600;
    display: grid;
    place-items: center;
    border: 1px solid var(--border);
  }

  .sidebar {
    grid-area: sidebar;
    border-right: 1px solid var(--border);
    background: var(--surface);
    padding: 20px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: sticky;
    top: 56px;
    align-self: start;
    height: calc(100vh - 56px);
    overflow-y: auto;
  }
  .nav-section {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted-2);
    padding: 14px 12px 6px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 8px;
    color: var(--ink-2);
    font-size: 14px;
    cursor: pointer;
    border: 0;
    background: transparent;
    width: 100%;
    text-align: left;
    font-weight: 450;
  }
  .nav-item:hover { background: var(--surface-2); }
  .nav-item.active {
    background: var(--accent-soft);
    color: var(--primary);
    font-weight: 500;
  }
  .nav-item .ico { width: 16px; height: 16px; flex: 0 0 16px; opacity: .7; }
  .nav-item.active .ico { opacity: 1; }
  .nav-badge {
    margin-left: auto;
    font-size: 11px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 999px;
    padding: 1px 7px;
    font-variant-numeric: tabular-nums;
  }
  .nav-item.active .nav-badge { background: rgba(255,255,255,.6); border-color: transparent; color: var(--primary); }

  .main { grid-area: main; min-width: 0; }
  .page {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 32px 80px;
  }
  .page-wide { max-width: 1320px; }
  .page h1 {
    font-family: var(--font-read);
    font-weight: 500;
    font-size: 30px;
    letter-spacing: -0.02em;
    margin: 0 0 4px;
  }
  .page-sub {
    color: var(--muted);
    font-size: 14px;
    margin: 0 0 24px;
  }

  /* Cards & primitives */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
  }
  .card-pad { padding: 20px; }
  .card-pad-lg { padding: 28px; }

  .btn {
    appearance: none;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--ink);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: background .15s, border-color .15s;
  }
  .btn:hover { background: var(--surface-2); border-color: var(--muted-2); }
  .btn-primary {
    background: var(--primary);
    color: var(--primary-ink);
    border-color: var(--primary);
  }
  .btn-primary:hover { background: #053a2c; border-color: #053a2c; }
  .btn-ghost { background: transparent; border-color: transparent; }
  .btn-ghost:hover { background: var(--surface-2); }
  .btn-icon { padding: 8px; }
  .btn-sm { padding: 5px 10px; font-size: 12.5px; }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px 10px;
    font-size: 12px;
    color: var(--muted);
  }
  .chip-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted-2); }
  .chip-ok .chip-dot { background: var(--accent); }
  .chip-ok { color: var(--primary); border-color: var(--accent-soft); background: #f0fdf6; }
  .chip-warn .chip-dot { background: #d97706; }
  .chip-warn { color: var(--warn); border-color: #fde9c8; background: #fef8eb; }

  .kbd {
    font-family: var(--font-mono);
    font-size: 11px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-bottom-width: 2px;
    border-radius: 5px;
    padding: 1px 6px;
    color: var(--muted);
  }

  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  /* Generic table */
  table.tbl {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }
  .tbl th {
    text-align: left;
    color: var(--muted);
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-2);
  }
  .tbl td {
    padding: 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .tbl tr:last-child td { border-bottom: 0; }
  .tbl tr:hover td { background: var(--surface-2); }

  /* Reader specific styling defined in reader.jsx style block */

  /* Focus rings */
  :focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 6px;
  }

  /* Login screen */
  .login-wrap {
    min-height: 100vh;
    display: grid;
    place-items: center;
    background:
      radial-gradient(800px 400px at 80% -10%, #d1fae5 0%, transparent 60%),
      radial-gradient(600px 400px at 0% 100%, #e6f2eb 0%, transparent 50%),
      var(--bg);
    padding: 24px;
  }

  .icon-btn {
    width: 36px; height: 36px;
    display: grid; place-items: center;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    color: var(--ink-2);
  }
  .icon-btn:hover { background: var(--surface-2); }

  /* Empty utility */
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; align-items: center; gap: 10px; }
  .row-between { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .grow { flex: 1; min-width: 0; }
  .truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .progress-bar {
    height: 6px;
    background: var(--bg);
    border-radius: 999px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .progress-bar > div {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--primary));
    border-radius: 999px;
  }

  /* Subtle motion */
  @keyframes pulseDot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .55; transform: scale(.85); }
  }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    animation: pulseDot 1.6s ease-in-out infinite;
  }

  /* Tweak panel resets that may bleed */
  .twk-panel { font-family: var(--font-ui) !important; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- PDF.js voor PDF-weergave en tekst-extractie -->
  <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script>
    if (window.pdfjsLib) {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
    }
  </script>

  <!-- Tesseract.js voor OCR (gescande PDF's) -->
  <script src="https://unpkg.com/tesseract.js@5.1.1/dist/tesseract.min.js"></script>

  <!-- Mammoth.js voor Word-documenten (.docx) -->
  <script src="https://unpkg.com/mammoth@1.8.0/mammoth.browser.min.js"></script>

  <script type="text/babel" src="src/tweaks-panel.jsx"></script>
  <script type="text/babel" src="src/data.jsx"></script>
  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/ui.jsx"></script>
  <script type="text/babel" src="src/reader.jsx"></script>
  <script type="text/babel" src="src/student.jsx"></script>
  <script type="text/babel" src="src/teacher.jsx"></script>
  <script type="text/babel" src="src/admin.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
