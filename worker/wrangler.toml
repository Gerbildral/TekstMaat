name = "mijnleeshulp"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
 
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = false
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

[vars]
ENVIRONMENT = "production"
JWT_SECRET = "NyCIK3jrrMMXPhBq6ynQ8I9C3B9mBIL7VQz1Mkz0f5lpkjAnpcJdmRQfBgHwjSJHaAu74tgBYDiTWHzWQ5122w=="
APP_URL = "https://mijnleeshulp.nl"
CDN_URL = "https://cdn.mijnleeshulp.nl"
FROM_EMAIL = "noreply@mijnleeshulp.nl"
 
# R2 bucket voor bestanden
[[r2_buckets]]
binding = "FILES_BUCKET"
bucket_name = "mijnleeshulp-files"
preview_bucket_name = "mijnleeshulp-files-preview"
jurisdiction = "eu"
 
# D1 database
[[d1_databases]]
binding = "DB"
database_name = "mijnleeshulp-db"
database_id = "b3b17c11-c0d4-4c13-936a-7db6746e2500"
 
# KV voor sessies/cache
[[kv_namespaces]]
binding = "SESSIONS"
id = "9be5f1e6ab3c46fa8144616a25a191ea"
preview_id = "d4e8ce68f0f64d27be7ea78141ed5a4d"
 
# AI binding voor OCR/tekst extractie
[ai]
binding = "AI"

# Email sending via Cloudflare Email Routing
[[send_email]]
name = "EMAIL"
 
[[rules]]
type = "ESModule"
globs = ["**/*.ts"]

# Development omgeving
[env.development]
vars = { ENVIRONMENT = "development", APP_URL = "http://localhost:8787", CDN_URL = "http://localhost:8787" }
 